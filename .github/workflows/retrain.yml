name: Weekly Retraining

on:
  schedule:
    - cron: '0 2 * * 0'  # Sunday 2AM UTC
  workflow_dispatch:     # allows manual trigger

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python src/pipeline.py

      - name: Commit Updated Model If Changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add models/production_model.pkl models/best_score.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto retrain: Updated model"
          git push